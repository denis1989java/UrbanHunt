<!DOCTYPE html>
<html>
<head>
    <title>Firebase Token Generator</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDkuDfNjL_9hazl-736O9rMmhJVBWxe4cU",
            authDomain: "urbanhunt-491913.firebaseapp.com",
            projectId: "urbanhunt-491913",
            storageBucket: "urbanhunt-491913.firebasestorage.app",
            messagingSenderId: "650271052918",
            appId: "1:650271052918:web:5c4545e6c6db08515ebb57"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.signInWithGoogle = function() {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider)
                .then((result) => {
                    return result.user.getIdToken();
                })
                .then((token) => {
                    document.getElementById('token').innerHTML =
                        '<strong>Firebase ID Token:</strong><br>' +
                        '<textarea rows="10" cols="100" id="tokenText">' + token + '</textarea><br>' +
                        '<button onclick="copyToken()">Copy Token</button><br>' +
                        '<small>Copy this token and paste it into Bruno dev environment variable "firebaseToken"</small>';
                    console.log('Token:', token);
                })
                .catch((error) => {
                    console.error('Error:', error);
                    alert('Error: ' + error.message);
                });
        };

        window.copyToken = function() {
            const tokenText = document.getElementById('tokenText');
            tokenText.select();
            document.execCommand('copy');
            alert('Token copied to clipboard!');
        };
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background-color: #357ae8;
        }
        textarea {
            width: 100%;
            font-family: monospace;
            font-size: 12px;
        }
        #token {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Firebase Token Generator for UrbanHunt</h1>
    <p>Click the button below to sign in with Google and get your Firebase ID token:</p>
    <button onclick="signInWithGoogle()">Sign in with Google</button>
    <div id="token"></div>
</body>
</html>
